  <title id="title">Vision Language Runtime</title>
  <desc id="desc">A multimodal flow from camera input to generated text and reasoning nodes.</desc>
  <style>
    @keyframes scan { 0%, 100% { transform: translateY(0); opacity: .45; } 50% { transform: translateY(86px); opacity: .9; } }
    @keyframes blink { 0%, 45%, 100% { opacity: 1; } 55%, 80% { opacity: .25; } }
    @media (prefers-reduced-motion: no-preference) {
      .scan-line { animation: scan 4.6s ease-in-out infinite; }
      .node-live { animation: blink 2.6s ease-in-out infinite; }
    }
  </style>
